    <style>
      @font-face {
        font-family: "Instrument Serif";
        font-style: italic;
        font-weight: 400;

      }
      @font-face {

        font-style: normal;

        color: rgba(26,26,26,0.04);

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const D = 35.9;

      // crossfade IN (the whole beat), never out
      tl.fromTo(".beat-fade", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.out" }, 0);

      // ambient — finite repeats only
      tl.to(".glyph", { rotation: 6, y: 20, duration: D, ease: "sine.inOut" }, 0);
      tl.to(".glow",  { scale: 1.04, duration: D / 2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 0);
      tl.to(".ghost", { x: 30, duration: D, ease: "sine.inOut" }, 0);

      // entrances — varied eases
      tl.fromTo("#b02-eyebrow",  { y: -24, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, 0.2);
      tl.fromTo("#b02-headline", { y: 30,  opacity: 0 }, { y: 0, opacity: 1, duration: 0.6, ease: "expo.out"   }, 0.3);

      // chat bubbles slide in from right
      tl.fromTo("#b02-bubble1", { x: 60, opacity: 0 }, { x: 0, opacity: 1, duration: 0.55, ease: "power3.out" }, 6.0);
      tl.fromTo("#b02-bubble2", { x: 60, opacity: 0 }, { x: 0, opacity: 1, duration: 0.55, ease: "power3.out" }, 6.3);
      tl.fromTo("#b02-bubble3", { x: 60, opacity: 0 }, { x: 0, opacity: 1, duration: 0.55, ease: "power3.out" }, 6.6);

      // stamps scale in with back.out
      tl.fromTo("#b02-stamp1", { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.45, ease: "back.out(2)" }, 9.0);
      tl.fromTo("#b02-stamp2", { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.45, ease: "back.out(2)" }, 9.3);
      tl.fromTo("#b02-stamp3", { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.45, ease: "back.out(2)" }, 9.6);

      // closing zone
      tl.fromTo("#b02-closing", { y: 40, opacity: 0 }, { y: 0, opacity: 1, duration: 0.65, ease: "power4.out" }, 18.0);
      tl.fromTo("#b02-sub",     { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5,  ease: "power2.out" }, 18.5);

      window.__timelines["b02-problem"] = tl;
    </script>
