<template id="b03-scarcity-template">
  <div data-composition-id="b03-scarcity" data-width="1920" data-height="1080">
    <!-- ============================================================
         BEAT 3 — SCARCITY · PAPER scene · quiet price-window warning
         VO 6.27s · scene 6.9s
         ============================================================ -->
    <div class="beat-fade">
      <div class="bg"></div>

      <!-- decoratives -->
      <div class="glow" data-layout-ignore></div>
      <div class="glyph" data-layout-ignore>✳</div>
      <div class="ghost" data-layout-ignore>dezygn</div>

      <div class="scene-content">
        <div id="b03-eyebrow" class="clip eyebrow" data-start="0.2" data-duration="6.7" data-track-index="2">
          A QUICK NOTE
        </div>

        <div id="b03-card" class="clip card" data-start="0.3" data-duration="6.6" data-track-index="3">
          <div id="b03-headline" class="clip card-headline" data-start="0.3" data-duration="6.6" data-track-index="4">
            This stays at this price for a <span class="serif-window">short window.</span>
          </div>
          <div id="b03-underline" class="clip accent-line" data-start="1.3" data-duration="5.6" data-track-index="6"></div>
          <div id="b03-sub" class="clip card-sub" data-start="0.8" data-duration="6.1" data-track-index="5">
            You'll see why by the end.
          </div>
        </div>
      </div>

      <!-- VO -->
      <audio id="b03-vo" class="clip" src="../assets/b03.wav" data-start="0.3" data-duration="6.27" data-track-index="9"></audio>
    </div>

    <style>
      @font-face {
        font-family: "Instrument Serif";
        font-style: italic;
        font-weight: 400;
        font-display: block;
        src: url("../assets/fonts/instrument-serif-italic.woff2") format("woff2");
      }
      @font-face {
        font-family: "Instrument Serif";
        font-style: normal;
        font-weight: 400;
        font-display: block;
        src: url("../assets/fonts/instrument-serif-regular.woff2") format("woff2");
      }
      [data-composition-id="b03-scarcity"] {
        --vellum: #f7f5f0;
        --paper: #edebe6;
        --ink: #1a1a1a;
        --inkWarm: #2b2b2b;
        --muted: #6b6459;
        --dim: #8b867b;
        --accent: #8b5cf6;
        --accentDeep: #7c3aed;
        --paperOnDark: #e8e4db;
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      [data-composition-id="b03-scarcity"] .beat-fade { position: absolute; inset: 0; }
      [data-composition-id="b03-scarcity"] .bg {
        position: absolute; inset: 0; z-index: 0;
        background: #edebe6;
      }
      /* breathing purple radial glow — very soft on light bg */
      [data-composition-id="b03-scarcity"] .glow {
        position: absolute; z-index: 1;
        width: 1000px; height: 1000px;
        left: 50%; top: 50%; transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(139,92,246,0.08) 0%, rgba(139,92,246,0.03) 50%, rgba(139,92,246,0) 70%);
        pointer-events: none;
      }
      [data-composition-id="b03-scarcity"] .glyph {
        position: absolute; z-index: 1;
        right: 60px; top: 40px;
        font-family: "Instrument Serif", serif;
        font-size: 240px; line-height: 1;
        color: rgba(139,92,246,0.07);
        pointer-events: none;
      }
      [data-composition-id="b03-scarcity"] .ghost {
        position: absolute; z-index: 1;
        left: -20px; bottom: 30px;
        font-family: "Inter", sans-serif; font-weight: 900;
        font-size: 260px; letter-spacing: -0.04em;
        color: rgba(26,26,26,0.04);
        pointer-events: none;
      }

      [data-composition-id="b03-scarcity"] .scene-content {
        position: absolute; inset: 0; z-index: 5;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 32px;
        width: 100%; height: 100%;
        padding: 80px 160px;
        box-sizing: border-box;
      }
      [data-composition-id="b03-scarcity"] .eyebrow {
        font-family: "IBM Plex Mono", monospace; font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.18em;
        font-size: 22px; color: var(--muted);
      }
      [data-composition-id="b03-scarcity"] .card {
        background: #ffffff;
        border-radius: 24px;
        padding: 64px 80px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.10), 0 4px 16px rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        max-width: 1080px;
        width: 100%;
        box-sizing: border-box;
      }
      [data-composition-id="b03-scarcity"] .card-headline {
        font-family: "Inter", sans-serif; font-weight: 700;
        font-size: 64px; line-height: 1.12; letter-spacing: -0.02em;
        color: var(--ink);
        text-align: center;
      }
      [data-composition-id="b03-scarcity"] .card-headline .serif-window {
        font-family: "Instrument Serif", serif; font-style: italic; font-weight: 400;
        font-size: 64px;
        color: var(--ink);
      }
      [data-composition-id="b03-scarcity"] .accent-line {
        display: block;
        width: 320px;
        height: 4px;
        border-radius: 2px;
        background: var(--accent);
        transform-origin: left center;
        opacity: 1;
      }
      [data-composition-id="b03-scarcity"] .card-sub {
        font-family: "Inter", sans-serif; font-weight: 500;
        font-size: 30px; color: var(--muted);
        text-align: center;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const D = 6.9;

      // crossfade IN — never out
      tl.fromTo(".beat-fade", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.out" }, 0);

      // ambient (finite, short given short beat duration)
      tl.to(".glyph", { rotation: 4, duration: D, ease: "sine.inOut" }, 0);
      tl.to(".glow",  { scale: 1.03, duration: D, ease: "sine.inOut" }, 0);
      tl.to(".ghost", { x: 20, duration: D, ease: "sine.inOut" }, 0);

      // entrances — varied eases, offset 0.1–0.3s after data-start
      tl.fromTo("#b03-eyebrow", { y: -20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.45, ease: "power3.out" }, 0.2);
      tl.fromTo("#b03-card",    { y: 40, opacity: 0, scale: 0.97 }, { y: 0, opacity: 1, scale: 1, duration: 0.65, ease: "expo.out" }, 0.3);
      tl.fromTo("#b03-headline",{ opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.35);
      tl.fromTo("#b03-sub",     { y: 16, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, ease: "power4.out" }, 0.8);
      tl.fromTo("#b03-underline", { scaleX: 0, transformOrigin: "left center" }, { scaleX: 1, duration: 0.5, ease: "power3.out" }, 1.5);

      window.__timelines["b03-scarcity"] = tl;
    </script>
  </div>
</template>
