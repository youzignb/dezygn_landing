    <script>

      const tl = gsap.timeline({ paused: true });
      const D = 26.8;

      // crossfade IN
      tl.fromTo(".beat-fade", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.out" }, 0);

      // ambient — finite

      tl.to("[data-composition-id='b06-benefits'] .glow",  { scale: 1.06, duration: D / 2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 0);
      tl.to("[data-composition-id='b06-benefits'] .ghost", { x: 40, duration: D, ease: "sine.inOut" }, 0);

      // Phase 1 — eyebrow + trio cards staggered

      tl.fromTo("#b06-card-pendant", { y: 60, opacity: 0, scale: 0.95 }, { y: 0, opacity: 1, scale: 1, duration: 0.7, ease: "power3.out" }, 0.4);
      tl.fromTo("#b06-card-toy",     { y: 70, opacity: 0, scale: 0.96 }, { y: 0, opacity: 1, scale: 1, duration: 0.65, ease: "expo.out"   }, 0.8);
