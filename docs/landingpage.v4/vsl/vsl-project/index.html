<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #1a1a1a;
      }
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- Root composition: orchestrates the 12 beat sub-compositions.
         Total duration = sum of beat durations (each = VO length + ~0.7s pad). -->
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="239.7"
      data-width="1920"
      data-height="1080"
    >
      <!-- Beats alternate track-index 0/1 and overlap by 0.5s so each beat's
           own entrance fade reads as a crossfade against the outgoing beat.
           start[n+1] = start[n] + dur[n] - 0.5 (overlap). -->
      <div id="b01" class="clip" data-composition-id="b01-open"      data-composition-src="compositions/b01-open.html"      data-start="0"      data-duration="20.4" data-width="1920" data-height="1080" data-track-index="0"></div>
      <div id="b02" class="clip" data-composition-id="b02-problem"   data-composition-src="compositions/b02-problem.html"   data-start="19.9"   data-duration="35.9" data-width="1920" data-height="1080" data-track-index="1"></div>
      <div id="b03" class="clip" data-composition-id="b03-scarcity"  data-composition-src="compositions/b03-scarcity.html"  data-start="55.3"   data-duration="6.9"  data-width="1920" data-height="1080" data-track-index="0"></div>
      <div id="b04" class="clip" data-composition-id="b04-agitate"   data-composition-src="compositions/b04-agitate.html"   data-start="61.7"   data-duration="24.3" data-width="1920" data-height="1080" data-track-index="1"></div>
      <div id="b05" class="clip" data-composition-id="b05-reveal"    data-composition-src="compositions/b05-reveal.html"    data-start="85.5"   data-duration="24.3" data-width="1920" data-height="1080" data-track-index="0"></div>
      <div id="b06" class="clip" data-composition-id="b06-benefits"  data-composition-src="compositions/b06-benefits.html"  data-start="109.3"  data-duration="26.8" data-width="1920" data-height="1080" data-track-index="1"></div>
      <div id="b07" class="clip" data-composition-id="b07-cta1"      data-composition-src="compositions/b07-cta1.html"      data-start="135.6"  data-duration="11.0" data-width="1920" data-height="1080" data-track-index="0"></div>
      <div id="b08" class="clip" data-composition-id="b08-proof"     data-composition-src="compositions/b08-proof.html"     data-start="146.1"  data-duration="27.5" data-width="1920" data-height="1080" data-track-index="1"></div>
      <div id="b09" class="clip" data-composition-id="b09-guarantee" data-composition-src="compositions/b09-guarantee.html" data-start="173.1"  data-duration="22.4" data-width="1920" data-height="1080" data-track-index="0"></div>
      <div id="b10" class="clip" data-composition-id="b10-cta2"      data-composition-src="compositions/b10-cta2.html"      data-start="195.0"  data-duration="16.3" data-width="1920" data-height="1080" data-track-index="1"></div>
      <div id="b11" class="clip" data-composition-id="b11-warnings"  data-composition-src="compositions/b11-warnings.html"  data-start="210.8"  data-duration="13.9" data-width="1920" data-height="1080" data-track-index="0"></div>
      <div id="b12" class="clip" data-composition-id="b12-close"     data-composition-src="compositions/b12-close.html"     data-start="224.2"  data-duration="15.5" data-width="1920" data-height="1080" data-track-index="1"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      // Root timeline is intentionally empty — the framework auto-nests each
      // beat's registered sub-timeline. Crossfade between beats is handled by
      // a brief opacity overlap baked into each beat's own entrance.
      const tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
